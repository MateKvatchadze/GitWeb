<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>website for GitHub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>




  <fieldset id="fieldsetTodo">
    <input type="text" id="todoInput" placeholder="enter your todo" autocomplete="off">
    <button id="todoBtn">add Todo</button><br>

    <h2>todo list</h2>
    <button id="filterAll">All</button>
    <button id="filterActive">Active</button>
    <button id="filterCompleted">Completed</button>


    <ul id="todoUl"></ul>
  </fieldset>


  <li draggable="false"></li>

  <script src="index.js"></script>
</body>

</html>
